# logrotate config for kawan-nusa-be (PM2 deployment)
#
#   sudo cp deploy/logrotate.conf /etc/logrotate.d/kawan-nusa-be
#   sudo logrotate -d /etc/logrotate.d/kawan-nusa-be   # dry-run / test
#
# Edit the path below to your deploy directory.
#
# NOTE: the app's own logs/app-YYYY-MM-DD.log files are ALREADY rotated daily by
# the app (src/core/helpers/logger.ts). They are pruned via cron instead — see
# deploy/crontab.example. This file only rotates PM2's stdout/stderr capture,
# which PM2 keeps an open handle on (hence copytruncate).

/opt/kawan-nusa-be/logs/pm2-out.log /opt/kawan-nusa-be/logs/pm2-error.log {
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
}

/opt/kawan-nusa-be/logs/cron-error.log {
    weekly
    rotate 8
    compress
    missingok
    notifempty
    copytruncate
}
