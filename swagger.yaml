      summary: Get statistics for a user
      description: "Retrieve combined statistics (count, monthly points, customer stats, redemption/point stats) for a specific user. Admin only."
      tags: [User]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          description: User ID
          schema: { type: integer, example: 1 }
        - name: type
          in: query
          description: "Customer stats type (yearly or monthly)"
          schema: { type: string, default: yearly, enum: [yearly, monthly] }
      responses:
        "200":
          description: Statistics retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          count:
                            $ref: "#/components/schemas/StatisticCount"
                          pointPerMonth:
                            type: array
                            items:
                              type: object
                              properties:
                                label: { type: string, example: "Januari" }
                                total: { type: number, example: 5000 }
                          customerStats:
                            type: array
                            items:
                              type: object
                              properties:
                                label: { type: string, example: "Januari" }
                                count: { type: integer, example: 10 }
                          redemptionPointStats:
                            type: array
                            items:
                              type: object
                              properties:
                                status: { type: string, example: "pending" }
                                count: { type: integer, example: 3 }
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "403":
          description: Forbidden - admin only
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
              example:
                success: false
                statusCode: 403
                message: "Forbidden access: admin only"

  # =============================================
  # FEEDBACK ROUTES
  # =============================================
  /feedback:
    get:
      summary: Get feedback by logged-in user
      description: "Fetch all feedback entries from AppScript that belong to the currently authenticated user."
      tags: [Feedback]
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Feedback retrieved successfully
          content:
            application/json:
              example:
                success: true
                statusCode: 200
                message: "Feedback retrieved successfully"
                data:
                  - timestamp: "2026-04-16T04:34:54.591Z"
                    userId: "1"
                    name: "Budi Santoso"
                    images:
                      - "https://domain.com/uploads/feedback/feedback_1_1744123456789_0.jpg"
                    url: "https://nusa.net.id"
                    category: "gallery"
                    message: "Pelayanan sangat memuaskan"
                    type: ""
                    reply: ""
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"

    post:
      summary: Submit new feedback
      description: "Upload 1–5 images (stored locally), then send the feedback data to AppScript in fire-and-forget fashion. Returns immediately after images are saved."
      tags: [Feedback]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/StoreFeedbackRequest"
      responses:
        "201":
          description: Feedback submitted successfully
          content:
            application/json:
              example:
                success: true
                statusCode: 201
                message: "Feedback submitted successfully"
                data: null
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "422":
          $ref: "#/components/responses/ValidationErrorResponse"

  # =============================================
  # POINT SUBMISSION ROUTES (Admin)
  # =============================================
  /point-submission:
    get:
      summary: List point submissions (admin only)
      tags: [PointSubmission]
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/SearchParam"
        - $ref: "#/components/parameters/SortParam"
        - $ref: "#/components/parameters/OrderParam"
        - $ref: "#/components/parameters/StartDateParam"
        - $ref: "#/components/parameters/EndDateParam"
        - name: status
          in: query
          schema: { type: string, enum: [pending, approved, rejected] }
        - name: type
          in: query
          schema: { type: string, enum: [OTC, Bulanan] }
      responses:
        "200":
          description: Point submissions retrieved successfully
          content:
            application/json:
              example:
                success: true
                statusCode: 200
                message: "Point submissions retrieved successfully"
                data:
                  - id: 1
                    userId: 5
                    type: "OTC"
                    point: 100
                    price: 10000
                    nisData:
                      custServId: 12345
                      custId: "CUST001"
                      accountName: "PT Nusanet"
                      serviceCode: "SVC001"
                      serviceName: "Internet 50Mbps"
                      accountManager: "John Doe"
                      salesEmployeeId: "EMP-001"
                    status: "pending"
                    isRecurring: false
                    recurringEndDate: null
                    notes: null
                    user:
                      id: 5
                      name: "Budi Santoso"
                    createdBy:
                      id: 1
                      name: "Admin Nusanet"
                    approvedBy: null
                    approvedAt: null
                    createdAt: "2024-06-01T07:00:00.000Z"
                meta:
                  total: 1
                  perPage: 10
                  currentPage: 1
                  lastPage: 1
                  from: 1
                  to: 1
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "403":
          description: Forbidden - admin role required
    post:
      summary: Create a new point submission (admin only)
      tags: [PointSubmission]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePointSubmissionRequest"
      responses:
        "201":
          description: Point submission created successfully
          content:
            application/json:
              example:
                success: true
                statusCode: 201
                message: "Point submission created successfully"
                data:
                  id: 1
                  userId: 5
                  type: "OTC"
                  point: 100
                  price: 10000
                  status: "pending"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "403":
          description: Forbidden - admin role required
        "422":
          $ref: "#/components/responses/ValidationErrorResponse"

  /point-submission/check-account:
    get:
      summary: Check if a NIS account is already submitted (admin only)
      tags: [PointSubmission]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: custServId
          in: query
          required: true
          schema: { type: integer }
          example: 12345
        - name: excludeId
          in: query
          schema: { type: integer }
          description: Exclude this submission ID from the check (for edit)
      responses:
        "200":
          description: Account check completed
          content:
            application/json:
              example:
                success: true
                statusCode: 200
                message: "Account check completed"
                data:
                  exists: false
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "403":
          description: Forbidden - admin role required

  /point-submission/approve:
    post:
      summary: Approve one or more pending submissions (admin only)
      tags: [PointSubmission]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApprovePointSubmissionRequest"
      responses:
        "200":
          description: Point submissions approved successfully
          content:
            application/json:
              example:
                success: true
                statusCode: 200
                message: "Point submissions approved successfully"
                data: null
        "400":
          description: Some submissions already processed
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "403":
          description: Forbidden - admin role required
        "404":
          $ref: "#/components/responses/NotFoundResponse"
        "422":
          $ref: "#/components/responses/ValidationErrorResponse"

  /point-submission/{id}:
    get:
      summary: Get point submission detail (admin only)
      tags: [PointSubmission]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
          example: 1
      responses:
        "200":
          description: Point submission retrieved successfully
          content:
            application/json:
              example:
                success: true
                statusCode: 200
                message: "Point submission retrieved successfully"
                data:
                  id: 1
                  userId: 5
                  type: "OTC"
                  point: 100
                  price: 10000
                  nisData:
                    custServId: 12345
                    custId: "CUST001"
                    accountName: "PT Nusanet"
                    serviceCode: "SVC001"
                    serviceName: "Internet 50Mbps"
                    accountManager: "John Doe"
                    salesEmployeeId: "EMP-001"
                  status: "pending"
                  isRecurring: false
                  recurringEndDate: null
                  notes: null
                  user:
                    id: 5
                    name: "Budi Santoso"
                  createdBy:
                    id: 1
                    name: "Admin Nusanet"
                  approvedBy: null
                  approvedAt: null
                  createdAt: "2024-06-01T07:00:00.000Z"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "403":
          description: Forbidden - admin role required
        "404":
          $ref: "#/components/responses/NotFoundResponse"
    put:
      summary: Update a point submission (admin only)
      tags: [PointSubmission]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
          example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                type: { type: string, enum: [OTC, Bulanan] }
                price: { type: number, minimum: 0 }
                nisData:
                  type: object
                  properties:
                    custServId: { type: integer }
                    custId: { type: string }
                    accountName: { type: string }
                    serviceCode: { type: string }
                    serviceName: { type: string }
                    accountManager: { type: string, nullable: true }
                    salesEmployeeId: { type: string, nullable: true }
                isRecurring: { type: boolean }
                recurringEndDate: { type: string, format: date, nullable: true }
      responses:
        "200":
          description: Point submission updated successfully
          content:
            application/json:
              example:
                success: true
                statusCode: 200
                message: "Point submission updated successfully"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "403":
          description: Forbidden - admin role required
        "404":
          $ref: "#/components/responses/NotFoundResponse"
        "422":
          $ref: "#/components/responses/ValidationErrorResponse"
    delete:
      summary: Delete a point submission (admin only)
      tags: [PointSubmission]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
          example: 1
      responses:
        "200":
          description: Point submission deleted successfully
          content:
            application/json:
              example:
                success: true
                statusCode: 200
                message: "Point submission deleted successfully"
                data: null
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "403":
          description: Forbidden - admin role required
        "404":
          $ref: "#/components/responses/NotFoundResponse"

  # =============================================
  # NIS ROUTES (Admin)
  # =============================================
  /nis/account:
    get:
      summary: Search NIS accounts from external database (admin only)
      tags: [PointSubmission]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: q
          in: query
          required: true
          schema: { type: string, minLength: 2 }
          description: Search keyword (min 2 characters)
          example: "nusanet"
      responses:
        "200":
          description: NIS accounts retrieved successfully
          content:
            application/json:
              example:
                success: true
                statusCode: 200
                message: "NIS accounts retrieved successfully"
                data:
                  - custServId: 12345
                    custId: "CUST001"
                    accountName: "PT Nusanet"
                    serviceCode: "SVC001"
                    serviceName: "Internet 50Mbps"
                    accountManager: "John Doe"
                    salesEmployeeId: "EMP-001"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "403":
          description: Forbidden - admin role required

tags:
  - name: Auth
    description: Authentication — register, login, logout, token refresh, and password reset
  - name: Profile
    description: Manage authenticated user's profile, bank info, and preferences
  - name: Point
    description: View current point balance
  - name: Point
    description: View and create reward point transactions
  - name: Redemption
    description: Create and view redemption requests (cash, voucher, product)
  - name: Customer
    description: View customers associated with the authenticated partner
  - name: CustomerService
    description: View customer service subscriptions
  - name: Service
    description: Browse internet/service packages offered by Nusanet
  - name: Template
    description: Download marketing template assets (PNG, JPG, PSD, MP4)
  - name: Catalog
    description: Browse items available for point redemption
  - name: Education
    description: Browse educational articles and videos
  - name: Statistic
    description: Dashboard statistics and chart data
  - name: Additional
    description: Lookup/reference data for dropdowns and filters
  - name: Feedback
    description: Submit and retrieve user feedback stored via Google AppScript
  - name: User
    description: Admin endpoints for managing and listing users
  - name: PointSubmission
    description: Admin endpoints for managing point submissions and NIS account search
