                    success: true
                    statusCode: 200
                    message: "Customer monthly statistics retrieved successfully"
                    data:
                      - label: "1 Maret"
                        count: 2
                      - label: "2 Maret"
                        count: 0
                      - label: "3 Maret"
                        count: 1
