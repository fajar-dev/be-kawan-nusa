openapi: 3.0.0
info:
  title: Kawan Nusa API
  description: Official API Documentation for Kawan Nusa Backend Service. Includes all endpoints for Authentication, Profile, Points, Customers, Rewards, Redemptions, Statistics, Education, Catalog, and more.
  version: 1.0.0
servers:
  - url: http://localhost:8000/api
    description: Local development server
  - url: /api
    description: Relative API server

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "JWT access token. Expires in 15 minutes."
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-API-KEY
      description: "Internal API key for server-to-server communication."

  schemas:
    # --- Base Wrapper Schemas ---
    BaseResponse:
      type: object
      properties:
        success: { type: boolean, example: true }
        statusCode: { type: integer, example: 200 }
        message: { type: string, example: "Operation successful" }

    PaginationMeta:
      type: object
      properties:
        total: { type: integer, example: 100 }
        perPage: { type: integer, example: 10 }
        currentPage: { type: integer, example: 1 }
        lastPage: { type: integer, example: 10 }
        from: { type: integer, example: 1 }
        to: { type: integer, example: 10 }

    ValidationError:
      type: object
      properties:
        success: { type: boolean, example: false }
        statusCode: { type: integer, example: 422 }
        message: { type: string, example: "Validation failed" }
        errors:
          type: object
          example:
            email: "Invalid email format"
            password: "Password must be at least 6 characters"

    # --- Auth Schemas ---
    RegisterRequest:
      type: object
      required: [firstName, lastName, birthDate, birthPlace, identityNumber, taxNumber, email, phone, address, bankName, accountNumber, accountHolderName, identity, account]
      properties:
        firstName: { type: string, example: "Budi" }
        lastName: { type: string, example: "Santoso" }
        birthDate: { type: string, format: date, example: "1990-05-15" }
        birthPlace: { type: string, example: "Surabaya" }
        identityNumber: { type: string, example: "3201234567890001" }
        taxNumber: { type: string, example: "01.234.567.8-901.000" }
        email: { type: string, format: email, example: "budi.santoso@nusanet.id" }
        phone: { type: string, example: "081234567890" }
        address: { type: string, example: "Jl. Raya Darmo No. 10, Surabaya" }
        bankName: { type: string, example: "BCA" }
        accountNumber: { type: string, example: "1234567890" }
        accountHolderName: { type: string, example: "Budi Santoso" }
        company: { type: string, nullable: true, example: "PT Nusanet" }
        jobPosition: { type: string, nullable: true, example: "Sales Manager" }
        companyAddress: { type: string, nullable: true, example: "Jl. Ngagel Jaya No. 88, Surabaya" }
        isWhatsapp: { type: boolean, example: true, description: "Whether the phone number is connected to WhatsApp" }
        identity:
          type: string
          format: binary
          description: "Identity document image (KTP). JPG/PNG/GIF. Max 5MB."
        account:
          type: string
          format: binary
          description: "Account book image (Buku Rekening). JPG/PNG/GIF. Max 5MB."

    LoginRequest:
      type: object
      required: [identifier, password]
      properties:
        identifier:
          type: string
          description: "Email address or phone number"
          example: "budi.santoso@nusanet.id"
        password: { type: string, example: "secret123" }

    ForgotPasswordRequest:
      type: object
      required: [email]
      properties:
        email:
          { type: string, format: email, example: "budi.santoso@nusanet.id" }

    ResetPasswordRequest:
      type: object
      required: [token, newPassword]
      properties:
        token: { type: string, example: "a3f8c2d1e9b4..." }
        newPassword: { type: string, minLength: 6, example: "newSecret123" }

    RefreshTokenRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          { type: string, example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..." }

    # --- Auth User Schema ---
    AuthUser:
      type: object
      properties:
        id: { type: integer, example: 1 }
        name: { type: string, example: "Budi Santoso" }
        photo:
          {
            type: string,
            nullable: true,
            example: "https://cdn.example.com/photo.jpg",
          }
        email:
          { type: string, format: email, nullable: true, example: "budi.santoso@nusanet.id" }
        phone: { type: string, nullable: true, example: "081234567890" }
        status: { type: string, enum: [pending, active, inactive, reject, revision], example: active }
        role:
          type: string
          enum: ["user", "admin"]
          example: "user"

    UserProfile:
      type: object
      properties:
        id: { type: integer, example: 1 }
        firstName: { type: string, example: "Budi" }
        lastName: { type: string, example: "Santoso" }
        photo:
          {
            type: string,
            nullable: true,
            example: "https://cdn.example.com/photo.jpg",
          }
        email:
          { type: string, format: email, nullable: true, example: "budi.santoso@nusanet.id" }
        phone: { type: string, nullable: true, example: "081234567890" }
        hasWhatsapp: { type: boolean, example: true }
        identityNumber: { type: integer, nullable: true, example: 3201234567890001 }
        taxNumber: { type: string, nullable: true, example: "01.234.567.8-901.000" }
        company: { type: string, example: "PT Nusanet" }
        jobPosition: { type: string, example: "Sales Manager" }
        birthDate: { type: string, format: date, nullable: true, example: "1990-05-15" }
        birthPlace: { type: string, nullable: true, example: "Surabaya" }
        address: { type: string, nullable: true, example: "Jl. Raya Darmo No. 10, Surabaya" }
        companyAddress: { type: string, nullable: true, example: "Jl. Ngagel Jaya No. 88, Surabaya" }
        identityPath:
          {
            type: string,
            nullable: true,
            example: "https://cdn.example.com/identity/1_1234567890.jpg",
          }
        bankDetails:
          type: object
          properties:
            holderName:
              { type: string, nullable: true, example: "Budi Santoso" }
            name: { type: string, nullable: true, example: "BCA" }
            number: { type: string, nullable: true, example: "1234567890" }
            accountPath:
              {
                type: string,
                nullable: true,
                example: "https://cdn.example.com/account/1_1234567890.jpg",
              }
        settings:
          type: object
          properties:
            isSubscribe: { type: boolean, example: true }
            isAutoWithdraw: { type: boolean, example: false }
        isVerified: { type: boolean, example: true }
        isBoarding: { type: boolean, example: false }
        status: { type: string, enum: [pending, active, inactive, reject, revision], example: active }
        statusNote: { type: string, nullable: true, example: "Data lengkap dan valid." }
        statusUpdatedAt: { type: string, format: date-time, nullable: true, example: "2025-01-15T10:30:00.000Z" }
        lastLoginAt:
          {
            type: string,
            format: date-time,
            nullable: true,
            example: "2025-06-24T10:30:00.000Z",
          }
        passwordUpdatedAt:
          {
            type: string,
            format: date-time,
            nullable: true,
            example: "2025-01-15T10:30:00.000Z",
          }
        createdAt:
          {
            type: string,
            format: date-time,
            example: "2024-06-01T08:00:00.000Z",
          }

    AuthResponse:
      type: object
      properties:
        user: { $ref: "#/components/schemas/AuthUser" }
        accessToken:
          type: string
          description: "JWT access token, expires in 15 minutes"
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOjEsImVtYWlsIjoiYnVkaUBleGFtcGxlLmNvbSJ9..."
        refreshToken:
          type: string
          description: "JWT refresh token, expires in 7 days"
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOjF9..."

    UpdateAccountRequest:
      type: object
      required: [firstName, lastName]
      properties:
        firstName: { type: string, example: "Budi" }
        lastName: { type: string, example: "Santoso" }
        email:
          { type: string, format: email, nullable: true, example: "budi.santoso@nusanet.id" }
        phone: { type: string, nullable: true, example: "081234567890" }
        hasWhatsapp: { type: boolean, example: true }
        identityNumber: { type: integer, nullable: true, example: 3201234567890001 }
        taxNumber: { type: string, nullable: true, example: "01.234.567.8-901.000" }
        company: { type: string, example: "PT Nusanet" }
        jobPosition: { type: string, example: "Sales Manager" }
        birthDate: { type: string, format: date, nullable: true, example: "1990-05-15" }
        birthPlace: { type: string, nullable: true, example: "Surabaya" }
        address: { type: string, nullable: true, example: "Jl. Raya Darmo No. 10, Surabaya" }
        companyAddress: { type: string, nullable: true, example: "Jl. Ngagel Jaya No. 88, Surabaya" }

    UpdateBankRequest:
      type: object
      required: [accountHolderName, bankName, accountNumber]
      properties:
        accountHolderName: { type: string, example: "Budi Santoso" }
        bankName: { type: string, example: "BCA" }
        accountNumber: { type: string, example: "1234567890" }

    UpdatePasswordRequest:
      type: object
      required: [oldPassword, newPassword]
      properties:
        oldPassword: { type: string, example: "oldSecret123" }
        newPassword: { type: string, minLength: 6, example: "newSecret456" }

    UpdatePreferenceRequest:
      type: object
      properties:
        isSubscribe: { type: boolean, example: true }
        isAutoWithdraw: { type: boolean, example: false }

    # --- Customer Schemas ---
    Customer:
      type: object
      properties:
        id: { type: string, example: "CUST-0001" }
        name: { type: string, example: "Warnet Jaya" }
        company: { type: string, example: "CV Jaya Abadi" }
        type: { type: string, example: "Warnet" }
        registrationDate: { type: string, format: date, example: "2024-01-15" }
        isActive: { type: boolean, example: true }
        phones:
          type: array
          items:
            type: object
            properties:
              id: { type: integer, example: 1 }
              phone: { type: string, example: "081234567890" }
              label: { type: string, example: "Primary" }
        emails:
          type: array
          items:
            type: object
            properties:
              id: { type: integer, example: 1 }
              email: { type: string, example: "warnet.jaya@example.com" }
              label: { type: string, example: "Primary" }

    CustomerDetail:
      allOf:
        - $ref: "#/components/schemas/Customer"
        - type: object
          properties:
            totalCustomerServices: { type: integer, example: 3 }
            latestCustomerService:
              nullable: true
              allOf:
                - $ref: "#/components/schemas/CustomerServiceItem"

    CustomerServiceItem:
      type: object
      properties:
        id: { type: integer, example: 42 }
        registrationDate:
          { type: string, format: date, nullable: true, example: "2024-01-10" }
        activationDate:
          { type: string, format: date, nullable: true, example: "2024-01-15" }
        address:
          { type: string, nullable: true, example: "Jl. Raya No.10, Surabaya" }
        startDate:
          { type: string, format: date, nullable: true, example: "2024-01-15" }
        endDate:
          { type: string, format: date, nullable: true, example: "2025-01-15" }
        status: { type: string, example: "AC" }
        referenceDate:
          { type: string, format: date, nullable: true, example: "2024-03-01" }
        sales:
          nullable: true
          type: object
          properties:
            id: { type: integer, example: 10 }
            name: { type: string, example: "Andi" }
            employeeId: { type: string, example: "EMP-001" }
        service:
          nullable: true
          type: object
          properties:
            code: { type: string, example: "SVC-FIBER-001" }
            name: { type: string, example: "Fiber Home 20 Mbps" }
            type: { type: string, example: "Internet" }
        customer:
          nullable: true
          type: object
          properties:
            id: { type: string, example: "CUST-0001" }
            name: { type: string, example: "Warnet Jaya" }
            company: { type: string, example: "CV Jaya Abadi" }
        totalPoint: { type: number, example: 1500 }
        latestPoint:
          nullable: true
          type: object
          properties:
            point: { type: number, example: 500 }
            type: { type: string, example: "OTP" }
            createdAt:
              {
                type: string,
                format: date-time,
                example: "2024-03-01T09:00:00.000Z",
              }

    # --- Service Schemas ---
    Service:
      type: object
      properties:
        id: { type: integer, example: 1 }
        code: { type: string, example: "SVC-FIBER-001" }
        name: { type: string, example: "Fiber Home 20 Mbps" }
        description:
          {
            type: string,
            example: "Internet fiber optic untuk rumahan, kecepatan 20 Mbps",
          }
        type: { type: string, example: "Internet" }
        isActive: { type: boolean, example: true }
        price: { type: number, example: 250000 }
        unit: { type: string, example: "Monthly" }
        category: { type: string, example: "Access Home" }
        features:
          type: array
          items: { type: string }
          example: ["Speed 20 Mbps", "Unlimited Quota", "24/7 Support"]
        url:
          {
            type: string,
            nullable: true,
            example: "https://nusanet.id/products/fiber-home-20",
          }
        lastReferanceDate:
          { type: string, format: date, nullable: true, example: "2024-03-15" }
        totalCustomerServices: { type: integer, example: 25 }
        totalPoint: { type: number, example: 12500 }

    # --- Point (Reward) Schemas ---
    Point:
      type: object
      properties:
        id: { type: integer, example: 101 }
        customerServiceId: { type: integer, example: 42 }
        price: { type: number, example: 250000 }
        expiredDate: { type: string, format: date, example: "2025-03-01" }
        point: { type: number, example: 500 }
        remainingPoint: { type: number, example: 500 }
        isExpired: { type: boolean, example: false }
        type:
          { type: string, enum: ["OTP", "Bulanan", "Cashback"], example: "OTP" }
        customerService:
          nullable: true
          type: object
          properties:
            id: { type: integer, example: 42 }
            serviceCode: { type: string, example: "SVC-FIBER-001" }
            activationDate:
              {
                type: string,
                format: date,
                nullable: true,
                example: "2024-01-15",
              }
            startDate:
              {
                type: string,
                format: date,
                nullable: true,
                example: "2024-01-15",
              }
            endDate:
              {
                type: string,
                format: date,
                nullable: true,
                example: "2025-01-15",
              }
        service:
          nullable: true
          type: object
          properties:
            code: { type: string, example: "SVC-FIBER-001" }
            name: { type: string, example: "Fiber Home 20 Mbps" }
        customer:
          nullable: true
          type: object
          properties:
            id: { type: string, example: "CUST-0001" }
            name: { type: string, example: "Warnet Jaya" }
        createdAt:
          {
            type: string,
            format: date-time,
            example: "2024-03-01T09:00:00.000Z",
          }

    CreatePointRequest:
      type: object
      required: [customerServiceId, price, point, type]
      properties:
        customerServiceId: { type: integer, minimum: 1, example: 42 }
        price: { type: number, minimum: 0, example: 250000 }
        point: { type: number, minimum: 0, example: 500 }
        type:
          type: string
          enum: ["OTP", "Bulanan", "Cashback"]
          example: "OTP"

    # --- Redemption Schemas ---
    Redemption:
      type: object
      properties:
        id: { type: integer, example: 1 }
        redempNo: { type: string, example: "RED-20240301-0001" }
        pointsUsed: { type: number, example: 1000 }
        type:
          {
            type: string,
            enum: ["cash", "voucher", "product"],
            example: "cash",
          }
        status:
          {
            type: string,
            enum: ["pending", "processing", "completed", "cancelled"],
            example: "pending",
          }
        notes:
          { type: string, nullable: true, example: "Mohon segera diproses" }
        withdrawDetails:
          nullable: true
          type: object
          properties:
            bankName: { type: string, example: "BCA" }
            accountNumber: { type: string, example: "1234567890" }
            accountHolderName: { type: string, example: "Budi Santoso" }
            payout: { type: number, example: 95000 }
            tax: { type: number, example: 5000 }
        voucherDetails:
          nullable: true
          type: object
          properties:
            catalog:
              nullable: true
              type: object
              properties:
                id: { type: integer, example: 5 }
                name: { type: string, example: "Voucher Tokopedia 50K" }
                image:
                  {
                    type: string,
                    example: "https://cdn.example.com/voucher.jpg",
                  }
                category:
                  nullable: true
                  type: object
                  properties:
                    id: { type: integer, example: 2 }
                    name: { type: string, example: "E-Commerce" }
            name: { type: string, example: "Budi Santoso" }
            email: { type: string, example: "budi.santoso@nusanet.id" }
            detail:
              nullable: true
              type: object
              properties:
                id: { type: integer, example: 10 }
                code: { type: string, example: "VCHRTOKO50K-ABCDE" }
                expiredDate:
                  { type: string, format: date, example: "2024-12-31" }
        productDetails:
          nullable: true
          type: object
          properties:
            catalog:
              nullable: true
              type: object
              properties:
                id: { type: integer, example: 7 }
                name: { type: string, example: "Mug Kawan Nusa" }
                image:
                  { type: string, example: "https://cdn.example.com/mug.jpg" }
                category:
                  nullable: true
                  type: object
                  properties:
                    id: { type: integer, example: 3 }
                    name: { type: string, example: "Merchandise" }
            name: { type: string, example: "Budi Santoso" }
            email: { type: string, example: "budi.santoso@nusanet.id" }
            phone: { type: string, example: "081234567890" }
            address: { type: string, example: "Jl. Raya No.10, Surabaya 60111" }
            shipping:
              nullable: true
              type: object
              properties:
                id: { type: integer, example: 3 }
                shipper: { type: string, example: "jne" }
                trackingNumber: { type: string, example: "JNE001234567890" }
                shippedAt:
                  {
                    type: string,
                    format: date-time,
                    example: "2024-03-05T14:00:00.000Z",
                  }
        createdAt:
          {
            type: string,
            format: date-time,
            example: "2024-03-01T09:00:00.000Z",
          }

    CreateCashRedemptionRequest:
      type: object
      required: [pointsUsed]
      properties:
        pointsUsed: { type: number, minimum: 1, example: 1000 }
        notes: { type: string, example: "Mohon segera diproses" }

    CreateRedemptionVoucherRequest:
      type: object
      required: [catalogId]
      properties:
        catalogId: { type: integer, example: 5 }
        notes: { type: string, example: "Voucher untuk hadiah" }

    CreateRedemptionProductRequest:
      type: object
      required: [catalogId, address]
      properties:
        catalogId: { type: integer, example: 7 }
        address:
          {
            type: string,
            example: "Jl. Raya No.10 RT 01/02, Kel. Tegalsari, Kec. Tegalsari, Surabaya 60111",
          }
        notes: { type: string, example: "Tolong dikirim pagi hari" }

    # --- Catalog Schemas ---
    Catalog:
      type: object
      properties:
        id: { type: integer, example: 5 }
        categoryId: { type: integer, example: 2 }
        name: { type: string, example: "Voucher Tokopedia 50K" }
        type: { type: string, enum: ["product", "voucher"], example: "voucher" }
        description:
          {
            type: string,
            example: "Voucher belanja Tokopedia senilai Rp 50.000",
          }
        point: { type: number, example: 500 }
        image:
          {
            type: string,
            example: "https://cdn.example.com/voucher-tokopedia.jpg",
          }
        stock: { type: integer, example: 47, description: "Sisa stok (remaining)" }
        stockUsed: { type: integer, example: 3, description: "Jumlah yang sudah ditukar" }
        expiredDate: { type: string, format: date, nullable: true, example: "2025-12-31" }
        category:
          type: object
          properties:
            id: { type: integer, example: 2 }
            name: { type: string, example: "E-Commerce" }
        createdBy:
          nullable: true
          type: object
          properties:
            id: { type: integer, example: 1 }
            name: { type: string, example: "Admin Nusanet" }
            employeeId: { type: string, example: "EMP-001" }

    CatalogStockHistory:
      type: object
      properties:
        id: { type: integer, example: 1 }
        catalogId: { type: integer, example: 5 }
        type: { type: string, enum: ["initial", "addition", "reduction", "opname", "redemption"], example: "redemption" }
        quantity: { type: integer, example: -1, description: "Delta (positive = add, negative = subtract)" }
        stockBefore: { type: integer, example: 48 }
        stockAfter: { type: integer, example: 47 }
        notes: { type: string, nullable: true, example: "Penukaran voucher oleh user #1" }
        createdBy:
          nullable: true
          type: object
          properties:
            id: { type: integer, example: 1 }
            name: { type: string, example: "Admin Nusanet" }
        createdAt: { type: string, format: date-time, example: "2024-06-01T08:00:00.000Z" }

    # --- Education Schemas ---
    EducationArticle:
      type: object
      properties:
        id: { type: integer, example: 1 }
        title:
          { type: string, example: "Tips Memaksimalkan Koneksi Internet Fiber" }
        content:
          {
            type: string,
            example: "Internet fiber optik adalah teknologi koneksi...",
          }
        image:
          { type: string, example: "https://cdn.example.com/article-fiber.jpg" }
        author:
          nullable: true
          type: object
          properties:
            name: { type: string, example: "Tim Nusanet" }
            employeeId: { type: string, example: "EMP-001" }
            photo: { type: string, nullable: true, example: "https://cdn.example.com/photo.jpg" }
        readingTime: { type: string, example: "3 menit baca" }
        isView: { type: boolean, example: false }
        categoryId: { type: integer, example: 1 }
        category:
          nullable: true
          type: object
          properties:
            id: { type: integer, example: 1 }
            name: { type: string, example: "Tips & Trik" }
        createdAt:
          {
            type: string,
            format: date-time,
            example: "2024-02-10T08:00:00.000Z",
          }

    EducationVideo:
      type: object
      properties:
        id: { type: integer, example: 1 }
        title:
          { type: string, example: "Cara Menggunakan Dashboard Kawan Nusa" }
        url:
          { type: string, example: "https://www.youtube.com/watch?v=example" }
        thumbnail:
          { type: string, example: "https://cdn.example.com/video-thumb.jpg" }
        description:
          {
            type: string,
            example: "Tutorial lengkap menggunakan fitur-fitur dashboard Kawan Nusa",
          }
        author:
          nullable: true
          type: object
          properties:
            name: { type: string, example: "Tim Nusanet" }
            employeeId: { type: string, example: "EMP-001" }
            photo: { type: string, nullable: true, example: "https://cdn.example.com/photo.jpg" }
        isView: { type: boolean, example: true }
        categoryId: { type: integer, example: 2 }
        category:
          nullable: true
          type: object
          properties:
            id: { type: integer, example: 2 }
            name: { type: string, example: "Tutorial" }
        createdAt:
          {
            type: string,
            format: date-time,
            example: "2024-02-15T08:00:00.000Z",
          }

    # --- Template Schemas ---
    Template:
      type: object
      properties:
        id: { type: integer, example: 1 }
        name: { type: string, example: "Banner Promo Lebaran 2024" }
        description:
          {
            type: string,
            nullable: true,
            example: "Template banner untuk promosi Hari Raya Lebaran",
          }
        thumbnail:
          {
            type: string,
            nullable: true,
            example: "https://cdn.example.com/template-thumb.jpg",
          }
        png:
          {
            type: string,
            nullable: true,
            example: "https://cdn.example.com/template.png",
          }
        jpg:
          {
            type: string,
            nullable: true,
            example: "https://cdn.example.com/template.jpg",
          }
        psd:
          {
            type: string,
            nullable: true,
            example: "https://cdn.example.com/template.psd",
          }
        mp4:
          {
            type: string,
            nullable: true,
            example: "https://cdn.example.com/template.mp4",
          }
        isActive: { type: boolean, example: true }
        createdAt:
          {
            type: string,
            format: date-time,
            example: "2024-01-20T08:00:00.000Z",
          }

    # --- Service Promotion Schemas ---
    ServicePromotion:
      type: object
      properties:
        id: { type: integer, example: 1 }
        title: { type: string, example: "Promo Double Speed Februari 2024" }
        description:
          {
            type: string,
            example: "Upgrade kecepatan internet Anda 2x lipat tanpa biaya tambahan",
          }
        image:
          { type: string, example: "https://cdn.example.com/promo-feb.jpg" }
        url:
          {
            type: string,
            nullable: true,
            example: "https://nusanet.id/promo/double-speed",
          }
        startPeriod: { type: string, format: date, example: "2024-02-01" }
        endPeriod: { type: string, format: date, example: "2024-02-29" }
        createdAt:
          {
            type: string,
            format: date-time,
            example: "2024-01-25T08:00:00.000Z",
          }
        service:
          type: object
          properties:
            code: { type: string, example: "SVC-FIBER-001" }
            name: { type: string, example: "Fiber Home 20 Mbps" }

    # --- Statistics Schemas ---
    Achievement:
      type: object
      properties:
        percentage: { type: integer, example: 12 }
        isUp: { type: boolean, example: true }

    StatisticCount:
      type: object
      properties:
        customer:
          type: object
          properties:
            value: { type: integer, example: 148 }
            achievement: { $ref: "#/components/schemas/Achievement" }
        customerService:
          type: object
          properties:
            value: { type: integer, example: 215 }
            achievement: { $ref: "#/components/schemas/Achievement" }
        point:
          type: object
          properties:
            value: { type: integer, example: 25500 }
            achievement: { $ref: "#/components/schemas/Achievement" }

    # --- Additional Schemas ---
    AdditionalItem:
      type: object
      properties:
        code: { type: string, example: "WARNET" }
        name: { type: string, example: "Warnet" }

    SearchResult:
      type: object
      properties:
        title: { type: string, example: "Warnet Jaya" }
        module: { type: string, example: "Customer" }
        route: { type: string, example: "/customer/CUST-0001" }

    # --- Feedback Schemas ---
    FeedbackItem:
      type: object
      properties:
        timestamp:
          { type: string, format: date-time, example: "2026-04-16T04:34:54.591Z" }
        userId: { type: string, example: "1" }
        name: { type: string, example: "Budi Santoso" }
        images:
          type: array
          items: { type: string, format: uri, example: "https://domain.com/uploads/feedback/feedback_1_1744123456789_0.jpg" }
        url: { type: string, format: uri, example: "https://nusa.net.id" }
        category: { type: string, example: "gallery" }
        message: { type: string, example: "Mengirim banyak gambar" }
        type: { type: string, example: "" }
        reply: { type: string, example: "" }

    StoreFeedbackRequest:
      type: object
      required: [message, type, "images[]"]
      properties:
        message: { type: string, example: "Pelayanan sangat memuaskan" }
        type: { type: string, example: "gallery" }
        url: { type: string, format: uri, example: "https://nusa.net.id" }
        "images[]":
          type: array
          minItems: 1
          maxItems: 5
          items: { type: string, format: binary }
          description: "1–5 image files (jpg, png, jpeg, etc)"

    # --- User List Schemas ---
    UserListItem:
      type: object
      properties:
        id: { type: integer, example: 1 }
        name: { type: string, example: "Budi Santoso" }
        photo:
          {
            type: string,
            nullable: true,
            example: "https://cdn.example.com/photo.jpg",
          }
        email:
          { type: string, format: email, nullable: true, example: "budi.santoso@nusanet.id" }
        phone: { type: string, nullable: true, example: "081234567890" }
        identityNumber: { type: integer, nullable: true, example: 3201234567890001 }
        taxNumber: { type: string, nullable: true, example: "01.234.567.8-901.000" }
        bank:
          type: object
          properties:
            holderName: { type: string, nullable: true, example: "Budi Santoso" }
            name: { type: string, nullable: true, example: "BCA" }
            number: { type: string, nullable: true, example: "1234567890" }
        status: { type: string, enum: [pending, active, inactive, reject, revision], example: active }
        lastReferanceDate: { type: string, format: date, nullable: true, example: "2024-03-15" }
        point: { type: number, example: 25500 }

    # --- Point Submission Schemas ---
    PointSubmission:
      type: object
      properties:
        id: { type: integer, example: 1 }
        userId: { type: integer, example: 5 }
        type: { type: string, enum: [OTC, Bulanan], example: "OTC" }
        point: { type: number, example: 100 }
        price: { type: number, example: 10000 }
        nisData:
          type: object
          properties:
            custServId: { type: integer, example: 12345 }
            custId: { type: string, example: "CUST001" }
            accountName: { type: string, example: "PT Nusanet" }
            serviceCode: { type: string, example: "SVC001" }
            serviceName: { type: string, example: "Internet 50Mbps" }
            accountManager: { type: string, nullable: true, example: "John Doe" }
            salesEmployeeId: { type: string, nullable: true, example: "EMP-001" }
        status: { type: string, enum: [pending, approved, rejected], example: "pending" }
        isRecurring: { type: boolean, example: false }
        recurringEndDate: { type: string, format: date, nullable: true, example: "2025-12-31" }
        notes: { type: string, nullable: true, example: "Approved by admin" }
        user:
          nullable: true
          type: object
          properties:
            id: { type: integer, example: 5 }
            name: { type: string, example: "Budi Santoso" }
        createdBy:
          nullable: true
          type: object
          properties:
            id: { type: integer, example: 1 }
            name: { type: string, example: "Admin Nusanet" }
        approvedBy:
          nullable: true
          type: object
          properties:
            id: { type: integer, example: 2 }
            name: { type: string, example: "Manager Nusanet" }
        approvedAt: { type: string, format: date-time, nullable: true, example: "2024-06-01T08:00:00.000Z" }
        createdAt: { type: string, format: date-time, example: "2024-06-01T07:00:00.000Z" }

    CreatePointSubmissionRequest:
      type: object
      required: [userId, type, price, nisData]
      properties:
        userId: { type: integer, example: 5 }
        type: { type: string, enum: [OTC, Bulanan], example: "OTC" }
        price: { type: number, minimum: 0, example: 10000 }
        nisData:
          type: object
          required: [custServId, custId, accountName, serviceCode, serviceName]
          properties:
            custServId: { type: integer, example: 12345 }
            custId: { type: string, example: "CUST001" }
            accountName: { type: string, example: "PT Nusanet" }
            serviceCode: { type: string, example: "SVC001" }
            serviceName: { type: string, example: "Internet 50Mbps" }
            accountManager: { type: string, nullable: true, example: "John Doe" }
            salesEmployeeId: { type: string, nullable: true, example: "EMP-001" }
        isRecurring: { type: boolean, default: false }
        recurringEndDate: { type: string, format: date, nullable: true }

    ApprovePointSubmissionRequest:
      type: object
      required: [ids]
      properties:
        ids:
          type: array
          items: { type: integer }
          minItems: 1
          example: [1, 2, 3]
        notes: { type: string, example: "Approved batch" }

    NisAccountResult:
      type: object
      properties:
        custServId: { type: integer, example: 12345 }
        custId: { type: string, example: "CUST001" }
        accountName: { type: string, example: "PT Nusanet" }
        serviceCode: { type: string, example: "SVC001" }
        serviceName: { type: string, example: "Internet 50Mbps" }
        accountManager: { type: string, nullable: true, example: "John Doe" }
        salesEmployeeId: { type: string, nullable: true, example: "EMP-001" }

  parameters:
    PageParam:
      name: page
      in: query
      description: Page number (default 1)
      schema: { type: integer, default: 1, example: 1 }
    LimitParam:
      name: limit
      in: query
      description: Items per page (default 10)
      schema: { type: integer, default: 10, example: 10 }
    SearchParam:
      name: q
      in: query
      description: Search keyword
      schema: { type: string, example: "nusanet" }
    SortParam:
      name: sort
      in: query
      description: Sort field name
      schema: { type: string }
    OrderParam:
      name: order
      in: query
      description: Sort direction
      schema: { type: string, enum: [ASC, DESC], default: DESC }
    StartDateParam:
      name: startDate
      in: query
      description: Filter from date (YYYY-MM-DD)
      schema: { type: string, format: date, example: "2024-01-01" }
    EndDateParam:
      name: endDate
      in: query
      description: Filter to date (YYYY-MM-DD)
      schema: { type: string, format: date, example: "2024-12-31" }

  responses:
    UnauthorizedResponse:
      description: Unauthorized - missing or invalid token
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/BaseResponse"
            example:
              success: false
              statusCode: 401
              message: "Unauthorized"

    NotFoundResponse:
      description: Not Found
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/BaseResponse"
            example:
              success: false
              statusCode: 404
              message: "Resource not found"

    ValidationErrorResponse:
      description: Validation Error
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ValidationError" }

paths:
  # =============================================
  # AUTH ROUTES
  # =============================================
  /auth/register:
    post:
      summary: Register new partner account
      description: "Register a new partner account with personal info, bank details, and document uploads (KTP & bank book). Account will be set as pending (status=pending) until approved by admin."
      tags: [Auth]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema: { $ref: "#/components/schemas/RegisterRequest" }
      responses:
        "201":
          description: User registered successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/AuthUser" }
              example:
                success: true
                statusCode: 201
                message: "User registered successfully"
                data:
                  id: 1
                  name: "Budi Santoso"
                  photo: null
                  email: "budi.santoso@nusanet.id"
                  phone: "081234567890"
                  status: pending
                  role: "user"
        "400":
          description: Email or phone already in use
          content:
            application/json:
              example:
                success: false
                statusCode: 400
                message: "Email already in use"
        "422":
          $ref: "#/components/responses/ValidationErrorResponse"

  /auth/verify-email:
    get:
      summary: Verify email and auto-login
      description: "Verify the user's email using the token sent via email. Sets isVerified=true (status remains pending until admin approves) and returns auth tokens for auto-login."
      tags: [Auth]
      parameters:
        - name: token
          in: query
          required: true
          schema: { type: string }
          description: "Email verification token"
      responses:
        "200":
          description: Email verified and logged in successfully
          content:
            application/json:
              example:
                success: true
                statusCode: 200
                message: "Email verified successfully"
                data:
                  user:
                    id: 1
                    name: "John Doe"
                    photo: null
                    email: "john@example.com"
                    phone: "081234567890"
                    status: active
                    isBoarding: false
                    role: "user"
                  accessToken: "eyJhbGciOiJIUzI1NiIs..."
                  refreshToken: "eyJhbGciOiJIUzI1NiIs..."
        "400":
          description: Invalid/expired token or already verified
          content:
            application/json:
              example:
                success: false
                statusCode: 400
                message: "Invalid or expired verification token"

  /auth/resend-verification:
    post:
      summary: Resend email verification
      description: "Resend the verification email to an unverified user."
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email, example: "budi.santoso@nusanet.id" }
      responses:
        "200":
          description: Verification email sent successfully
          content:
            application/json:
              example:
                success: true
                statusCode: 200
                message: "Verification email sent successfully"
                data: null
        "400":
          description: Email not found or already verified
          content:
            application/json:
              example:
                success: false
                statusCode: 400
                message: "Email already verified"
        "422":
          $ref: "#/components/responses/ValidationErrorResponse"

  /auth/check-email-status:
    get:
      summary: Check email verification status
      description: "Lightweight check to see if an email needs verification. Does not send any email."
      tags: [Auth]
      parameters:
        - name: email
          in: query
          required: true
          schema: { type: string, format: email }
          description: "Email address to check"
      responses:
        "200":
          description: Email needs verification
          content:
            application/json:
              example:
                success: true
                statusCode: 200
                message: "Success"
                data:
                  needsVerification: true
        "400":
          description: Email not found or already verified
          content:
            application/json:
              example:
                success: false
                statusCode: 400
                message: "Email already verified"

  /auth/login:
    post:
      summary: Login to partner account
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginRequest" }
            example:
              identifier: "budi.santoso@nusanet.id"
              password: "secret123"
      responses:
        "200":
          description: Logged in successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/AuthResponse" }
              example:
                success: true
                statusCode: 200
                message: "Logged in successfully"
                data:
                  user:
                    id: 1
                    name: "Budi Santoso"
                    photo: null
                    email: "budi.santoso@nusanet.id"
                    phone: "081234567890"
                    status: active
                    role: "user"
                  accessToken: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                  refreshToken: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        "401":
          description: Invalid credentials
          content:
            application/json:
              example:
                success: false
                statusCode: 401
                message: "Invalid credentials"
        "422":
          $ref: "#/components/responses/ValidationErrorResponse"

  /auth/google:
    post:
      summary: Login with Google OAuth (user)
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code: { type: string, example: "4/0AX4XfWh..." }
            example:
              code: "4/0AX4XfWh..."
      responses:
        "200":
          description: Logged in successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/AuthResponse" }
              example:
                success: true
                statusCode: 200
                message: "Logged in successfully"
                data:
                  user:
                    id: 1
                    name: "Budi Santoso"
                    photo: null
                    email: "budi.santoso@nusanet.id"
                    phone: "081234567890"
                    status: active
                    role: "user"
                  accessToken: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                  refreshToken: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        "400":
          description: User not registered
          content:
            application/json:
              example:
                success: false
                statusCode: 400
                message: "User not registered"

  /auth/admin/google:
    post:
      summary: Login with Google OAuth (admin/employee)
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code: { type: string, example: "4/0AX4XfWh..." }
            example:
              code: "4/0AX4XfWh..."
      responses:
        "200":
          description: Logged in successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/AuthResponse" }
              example:
                success: true
                statusCode: 200
                message: "Logged in successfully"
                data:
                  user:
                    id: 10
                    name: "Admin User"
                    photo: null
                    email: "admin@nusanet.id"
                    phone: "081234567890"
                    status: active
                    role: "admin"
                  accessToken: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                  refreshToken: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        "400":
          description: Employee not registered
          content:
            application/json:
              example:
                success: false
                statusCode: 400
                message: "Employee not registered"

  /auth/forgot-password:
    post:
      summary: Request password reset link via email
      description: |
        Generates a new reset token stored in a separate `password_reset_tokens` table.
        Multiple tokens can exist per user (each forgot-password request creates a new one).
        Tokens expire after 10 hours.
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ForgotPasswordRequest" }
            example:
              email: "budi.santoso@nusanet.id"
      responses:
        "200":
          description: Reset instructions sent to email
          content:
            application/json:
              example:
                success: true
                statusCode: 200
                message: "Password reset instructions have been sent to your email"
                data: null
        "400":
          description: Email not found
          content:
            application/json:
              example:
                success: false
                statusCode: 400
                message: "Email not found"
        "422":
          $ref: "#/components/responses/ValidationErrorResponse"

  /auth/validate-reset-token:
    get:
      summary: Validate a password reset token
      description: |
        Validates the token from the `password_reset_tokens` table.
        Only the token is required — the user is resolved from the token's relation.
      tags: [Auth]
      parameters:
        - name: token
          in: query
          required: true
          description: Reset token received via email
          schema: { type: string }
          example: "a3f8c2d1e9b4..."
      responses:
        "200":
          description: Token is valid
          content:
            application/json:
              example:
                success: true
                statusCode: 200
                message: "Token is valid"
                data: null
        "400":
          description: Invalid or expired token
          content:
            application/json:
              example:
                success: false
                statusCode: 400
                message: "Invalid or expired reset token"

  /auth/reset-password:
    post:
      summary: Reset password using token from email
      description: |
        Validates the token from the `password_reset_tokens` table, updates the user's password,
        then deletes **all** reset tokens for that user.
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ResetPasswordRequest" }
            example:
              token: "a3f8c2d1e9b4..."
              newPassword: "newSecret123"
      responses:
        "200":
          description: Password reset successfully
          content:
            application/json:
              example:
                success: true
                statusCode: 200
                message: "Password has been successfully reset"
                data: null
        "400":
          description: Invalid or expired token
          content:
            application/json:
              example:
                success: false
                statusCode: 400
                message: "Invalid or expired reset token"
        "422":
          $ref: "#/components/responses/ValidationErrorResponse"

  /auth/refresh:
    post:
      summary: Refresh access token using refresh token
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RefreshTokenRequest" }
            example:
              refreshToken: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
      responses:
        "200":
          description: Token refreshed successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/AuthResponse" }
              example:
                success: true
                statusCode: 200
                message: "Token refreshed successfully"
                data:
                  user:
                    id: 1
                    name: "Budi Santoso"
                    photo: null
                    email: "budi.santoso@nusanet.id"
                    phone: "081234567890"
                    status: active
                    role: "user"
                  accessToken: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.new..."
                  refreshToken: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.new..."
        "401":
          description: Invalid or expired refresh token
          content:
            application/json:
              example:
                success: false
                statusCode: 401
                message: "Invalid or expired refresh token"

  /auth/me:
    get:
      summary: Get authenticated user details
      tags: [Auth]
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: User profile retrieved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/AuthUser" }
              example:
                success: true
                statusCode: 200
                message: "User profile retrieved successfully"
                data:
                  id: 1
                  name: "Budi Santoso"
                  photo: null
                  email: "budi.santoso@nusanet.id"
                  phone: "081234567890"
                  status: active
                  role: "user"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"

  /auth/logout:
    post:
      summary: Logout (client should discard tokens)
      tags: [Auth]
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Logged out successfully
          content:
            application/json:
              example:
                success: true
                statusCode: 200
                message: "Logged out successfully"
                data: null
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"

  /auth/otp/send:
    post:
      summary: Send OTP code for login
      description: "Sends a 6-digit OTP code to the user's email or phone. If identifier contains '@', sends via email. Otherwise, logs to console (phone not yet implemented)."
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [identifier]
              properties:
                identifier:
                  type: string
                  description: "Email address or phone number"
                  example: "user@example.com"
      responses:
        "200":
          description: OTP sent successfully
          content:
            application/json:
              example:
                success: true
                statusCode: 200
                message: "OTP sent successfully"
                data:
                  type: "email"
        "400":
          description: User not found, not verified, or inactive
          content:
            application/json:
              example:
                success: false
                statusCode: 400
                message: "User not found"

  /auth/otp/verify:
    post:
      summary: Verify OTP code and login
      description: "Verifies the OTP code and returns auth tokens for auto-login. OTP codes expire after 5 minutes."
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [identifier, code]
              properties:
                identifier:
                  type: string
                  description: "Email address or phone number used to request OTP"
                  example: "user@example.com"
                code:
                  type: string
                  description: "6-digit OTP code"
                  example: "123456"
      responses:
        "200":
          description: OTP verified, logged in successfully
          content:
            application/json:
              example:
                success: true
                statusCode: 200
                message: "Logged in successfully"
                data:
                  user:
                    id: 1
                    name: "John Doe"
                    email: "user@example.com"
                    phone: "081234567890"
                    status: active
                    isBoarding: false
                    role: "user"
                  accessToken: "eyJhbGciOiJIUzI1NiIs..."
                  refreshToken: "eyJhbGciOiJIUzI1NiIs..."
        "400":
          description: Invalid or expired OTP code
          content:
            application/json:
              example:
                success: false
                statusCode: 400
                message: "Invalid or expired OTP code"

