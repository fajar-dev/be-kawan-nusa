openapi: 3.0.0
info:
  title: Kawan Nusa API
  description: Official API Documentation for Kawan Nusa Backend Service. Includes all endpoints for Authentication, Profile, Points, Customers, Rewards, Redemptions, Statistics, Education, Catalog, and more.
  version: 1.0.0
servers:
  - url: http://localhost:8000/api
    description: Local development server
  - url: /api
    description: Relative API server

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "JWT access token. Expires in 15 minutes."
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-API-KEY
      description: "Internal API key for server-to-server communication."

  schemas:
    # --- Base Wrapper Schemas ---
    BaseResponse:
      type: object
      properties:
        success: { type: boolean, example: true }
        statusCode: { type: integer, example: 200 }
        message: { type: string, example: "Operation successful" }

    PaginationMeta:
      type: object
      properties:
        total: { type: integer, example: 100 }
        perPage: { type: integer, example: 10 }
        currentPage: { type: integer, example: 1 }
        lastPage: { type: integer, example: 10 }
        from: { type: integer, example: 1 }
        to: { type: integer, example: 10 }

    ValidationError:
      type: object
      properties:
        success: { type: boolean, example: false }
        statusCode: { type: integer, example: 422 }
        message: { type: string, example: "Validation failed" }
        errors:
          type: object
          example:
            email: "Invalid email format"
            password: "Password must be at least 6 characters"

    # --- Auth Schemas ---
    RegisterRequest:
      type: object
      required: [firstName, lastName, email, phone, password]
      properties:
        firstName: { type: string, example: "Budi" }
        lastName: { type: string, example: "Santoso" }
        company: { type: string, example: "PT Nusanet" }
        jobPosition: { type: string, example: "Sales Manager" }
        email: { type: string, format: email, example: "budi.santoso@nusanet.id" }
        phone: { type: string, example: "081234567890" }
        password: { type: string, minLength: 6, example: "secret123" }
        accountHolderName: { type: string, example: "Budi Santoso" }
        bankName: { type: string, example: "BCA" }
        accountNumber: { type: string, example: "1234567890" }
        isSubscribe: { type: boolean, default: false, example: true }
        isAutoWithdraw: { type: boolean, default: false, example: false }

    LoginRequest:
      type: object
      required: [identifier, password]
      properties:
        identifier:
          type: string
          description: "Email address or phone number"
          example: "budi.santoso@nusanet.id"
        password: { type: string, example: "secret123" }

    ForgotPasswordRequest:
      type: object
      required: [email]
      properties:
        email: { type: string, format: email, example: "budi.santoso@nusanet.id" }

    ResetPasswordRequest:
      type: object
      required: [token, newPassword]
      properties:
        token: { type: string, example: "a3f8c2d1e9b4..." }
        newPassword: { type: string, minLength: 6, example: "newSecret123" }

    RefreshTokenRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken: { type: string, example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..." }

    # --- User / Profile Schemas ---
    User:
      type: object
      properties:
        id: { type: integer, example: 1 }
        firstName: { type: string, example: "Budi" }
        lastName: { type: string, example: "Santoso" }
        photo: { type: string, nullable: true, example: "https://cdn.example.com/photo.jpg" }
        email: { type: string, format: email, example: "budi.santoso@nusanet.id" }
        phone: { type: string, example: "081234567890" }
        company: { type: string, example: "PT Nusanet" }
        jobPosition: { type: string, example: "Sales Manager" }
        bankDetails:
          type: object
          properties:
            holderName: { type: string, nullable: true, example: "Budi Santoso" }
            name: { type: string, nullable: true, example: "BCA" }
            number: { type: string, nullable: true, example: "1234567890" }
        settings:
          type: object
          properties:
            isSubscribe: { type: boolean, example: true }
            isAutoWithdraw: { type: boolean, example: false }
        passwordUpdatedAt: { type: string, format: date-time, nullable: true, example: "2025-01-15T10:30:00.000Z" }
        createdAt: { type: string, format: date-time, example: "2024-06-01T08:00:00.000Z" }

    AuthResponse:
      type: object
      properties:
        user: { $ref: '#/components/schemas/User' }
        accessToken:
          type: string
          description: "JWT access token, expires in 15 minutes"
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOjEsImVtYWlsIjoiYnVkaUBleGFtcGxlLmNvbSJ9..."
        refreshToken:
          type: string
          description: "JWT refresh token, expires in 7 days"
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOjF9..."

    UpdateAccountRequest:
      type: object
      required: [firstName, lastName, email, phone]
      properties:
        firstName: { type: string, example: "Budi" }
        lastName: { type: string, example: "Santoso" }
        email: { type: string, format: email, example: "budi.santoso@nusanet.id" }
        phone: { type: string, example: "081234567890" }
        company: { type: string, example: "PT Nusanet" }
        jobPosition: { type: string, example: "Sales Manager" }

    UpdateBankRequest:
      type: object
      required: [accountHolderName, bankName, accountNumber]
      properties:
        accountHolderName: { type: string, example: "Budi Santoso" }
        bankName: { type: string, example: "BCA" }
        accountNumber: { type: string, example: "1234567890" }

    UpdatePasswordRequest:
      type: object
      required: [oldPassword, newPassword]
      properties:
        oldPassword: { type: string, example: "oldSecret123" }
        newPassword: { type: string, minLength: 6, example: "newSecret456" }

    UpdatePreferenceRequest:
      type: object
      properties:
        isSubscribe: { type: boolean, example: true }
        isAutoWithdraw: { type: boolean, example: false }

    # --- Customer Schemas ---
    Customer:
      type: object
      properties:
        id: { type: string, example: "CUST-0001" }
        name: { type: string, example: "Warnet Jaya" }
        company: { type: string, example: "CV Jaya Abadi" }
        type: { type: string, example: "Warnet" }
        registrationDate: { type: string, format: date, example: "2024-01-15" }
        isActive: { type: boolean, example: true }
        phones:
          type: array
          items:
            type: object
            properties:
              id: { type: integer, example: 1 }
              phone: { type: string, example: "081234567890" }
              label: { type: string, example: "Primary" }
        emails:
          type: array
          items:
            type: object
            properties:
              id: { type: integer, example: 1 }
              email: { type: string, example: "warnet.jaya@example.com" }
              label: { type: string, example: "Primary" }

    CustomerDetail:
      allOf:
        - $ref: '#/components/schemas/Customer'
        - type: object
          properties:
            totalCustomerServices: { type: integer, example: 3 }
            latestCustomerService:
              nullable: true
              allOf:
                - $ref: '#/components/schemas/CustomerServiceItem'

    CustomerServiceItem:
      type: object
      properties:
        id: { type: integer, example: 42 }
        customerId: { type: string, example: "CUST-0001" }
        serviceCode: { type: string, example: "SVC-FIBER-001" }
        registrationDate: { type: string, format: date, nullable: true, example: "2024-01-10" }
        activationDate: { type: string, format: date, nullable: true, example: "2024-01-15" }
        address: { type: string, nullable: true, example: "Jl. Raya No.10, Surabaya" }
        startDate: { type: string, format: date, nullable: true, example: "2024-01-15" }
        endDate: { type: string, format: date, nullable: true, example: "2025-01-15" }
        status: { type: string, example: "AC" }
        referenceDate: { type: string, format: date, nullable: true, example: "2024-03-01" }
        salesName: { type: string, nullable: true, example: "Andi" }
        service:
          nullable: true
          type: object
          properties:
            code: { type: string, example: "SVC-FIBER-001" }
            name: { type: string, example: "Fiber Home 20 Mbps" }
            type: { type: string, example: "Internet" }
        totalPoint: { type: number, example: 1500 }
        latestReward:
          nullable: true
          type: object
          properties:
            point: { type: number, example: 500 }
            type: { type: string, example: "OTP" }
            createdAt: { type: string, format: date-time, example: "2024-03-01T09:00:00.000Z" }

    # --- Service Schemas ---
    Service:
      type: object
      properties:
        id: { type: integer, example: 1 }
        code: { type: string, example: "SVC-FIBER-001" }
        name: { type: string, example: "Fiber Home 20 Mbps" }
        description: { type: string, example: "Internet fiber optic untuk rumahan, kecepatan 20 Mbps" }
        type: { type: string, example: "Internet" }
        isActive: { type: boolean, example: true }
        price: { type: number, example: 250000 }
        unit: { type: string, example: "Monthly" }
        category: { type: string, example: "Access Home" }
        features:
          type: array
          items: { type: string }
          example: ["Speed 20 Mbps", "Unlimited Quota", "24/7 Support"]
        url: { type: string, nullable: true, example: "https://nusanet.id/products/fiber-home-20" }
        lastReferanceDate: { type: string, format: date, nullable: true, example: "2024-03-15" }
        totalCustomerServices: { type: integer, example: 25 }
        totalPoint: { type: number, example: 12500 }

    # --- Reward Schemas ---
    Reward:
      type: object
      properties:
        id: { type: integer, example: 101 }
        customerServiceId: { type: integer, example: 42 }
        price: { type: number, example: 250000 }
        expiredDate: { type: string, format: date, example: "2025-03-01" }
        point: { type: number, example: 500 }
        remainingPoint: { type: number, example: 500 }
        isExpired: { type: boolean, example: false }
        type: { type: string, enum: ["OTP", "Bulanan", "Cashback"], example: "OTP" }
        customerService:
          nullable: true
          type: object
          properties:
            id: { type: integer, example: 42 }
            serviceCode: { type: string, example: "SVC-FIBER-001" }
            activationDate: { type: string, format: date, nullable: true, example: "2024-01-15" }
            startDate: { type: string, format: date, nullable: true, example: "2024-01-15" }
            endDate: { type: string, format: date, nullable: true, example: "2025-01-15" }
        service:
          nullable: true
          type: object
          properties:
            code: { type: string, example: "SVC-FIBER-001" }
            name: { type: string, example: "Fiber Home 20 Mbps" }
        customer:
          nullable: true
          type: object
          properties:
            id: { type: string, example: "CUST-0001" }
            name: { type: string, example: "Warnet Jaya" }
        createdAt: { type: string, format: date-time, example: "2024-03-01T09:00:00.000Z" }

    CreateRewardRequest:
      type: object
      required: [customerServiceId, price, point, type]
      properties:
        customerServiceId: { type: integer, minimum: 1, example: 42 }
        price: { type: number, minimum: 0, example: 250000 }
        point: { type: number, minimum: 0, example: 500 }
        type:
          type: string
          enum: ["OTP", "Bulanan", "Cashback"]
          example: "OTP"

    # --- Redemption Schemas ---
    Redemption:
      type: object
      properties:
        id: { type: integer, example: 1 }
        redempNo: { type: string, example: "RED-20240301-0001" }
        pointsUsed: { type: number, example: 1000 }
        type: { type: string, enum: ["cash", "voucher", "product"], example: "cash" }
        status: { type: string, enum: ["pending", "processing", "completed", "cancelled"], example: "pending" }
        notes: { type: string, nullable: true, example: "Mohon segera diproses" }
        withdrawDetails:
          nullable: true
          type: object
          properties:
            bankName: { type: string, example: "BCA" }
            accountNumber: { type: string, example: "1234567890" }
            accountHolderName: { type: string, example: "Budi Santoso" }
            payout: { type: number, example: 95000 }
            tax: { type: number, example: 5000 }
        voucherDetails:
          nullable: true
          type: object
          properties:
            catalog:
              nullable: true
              type: object
              properties:
                id: { type: integer, example: 5 }
                name: { type: string, example: "Voucher Tokopedia 50K" }
                image: { type: string, example: "https://cdn.example.com/voucher.jpg" }
                category:
                  nullable: true
                  type: object
                  properties:
                    id: { type: integer, example: 2 }
                    name: { type: string, example: "E-Commerce" }
            name: { type: string, example: "Budi Santoso" }
            email: { type: string, example: "budi.santoso@nusanet.id" }
            detail:
              nullable: true
              type: object
              properties:
                id: { type: integer, example: 10 }
                code: { type: string, example: "VCHRTOKO50K-ABCDE" }
                expiredDate: { type: string, format: date, example: "2024-12-31" }
        productDetails:
          nullable: true
          type: object
          properties:
            catalog:
              nullable: true
              type: object
              properties:
                id: { type: integer, example: 7 }
                name: { type: string, example: "Mug Kawan Nusa" }
                image: { type: string, example: "https://cdn.example.com/mug.jpg" }
                category:
                  nullable: true
                  type: object
                  properties:
                    id: { type: integer, example: 3 }
                    name: { type: string, example: "Merchandise" }
            name: { type: string, example: "Budi Santoso" }
            email: { type: string, example: "budi.santoso@nusanet.id" }
            phone: { type: string, example: "081234567890" }
            address: { type: string, example: "Jl. Raya No.10, Surabaya 60111" }
            shipping:
              nullable: true
              type: object
              properties:
                id: { type: integer, example: 3 }
                shipper: { type: string, example: "jne" }
                trackingNumber: { type: string, example: "JNE001234567890" }
                shippedAt: { type: string, format: date-time, example: "2024-03-05T14:00:00.000Z" }
        createdAt: { type: string, format: date-time, example: "2024-03-01T09:00:00.000Z" }

    CreateCashRedemptionRequest:
      type: object
      required: [pointsUsed]
      properties:
        pointsUsed: { type: number, minimum: 1, example: 1000 }
        notes: { type: string, example: "Mohon segera diproses" }

    CreateRedemptionVoucherRequest:
      type: object
      required: [catalogId]
      properties:
        catalogId: { type: integer, example: 5 }
        notes: { type: string, example: "Voucher untuk hadiah" }

    CreateRedemptionProductRequest:
      type: object
      required: [catalogId, address]
      properties:
        catalogId: { type: integer, example: 7 }
        address: { type: string, example: "Jl. Raya No.10 RT 01/02, Kel. Tegalsari, Kec. Tegalsari, Surabaya 60111" }
        notes: { type: string, example: "Tolong dikirim pagi hari" }

    # --- Catalog Schemas ---
    Catalog:
      type: object
      properties:
        id: { type: integer, example: 5 }
        name: { type: string, example: "Voucher Tokopedia 50K" }
        description: { type: string, example: "Voucher belanja Tokopedia senilai Rp 50.000" }
        point: { type: number, example: 500 }
        image: { type: string, example: "https://cdn.example.com/voucher-tokopedia.jpg" }
        type: { type: string, example: "voucher" }
        category:
          type: object
          properties:
            id: { type: integer, example: 2 }
            name: { type: string, example: "E-Commerce" }

    # --- Education Schemas ---
    EducationArticle:
      type: object
      properties:
        id: { type: integer, example: 1 }
        title: { type: string, example: "Tips Memaksimalkan Koneksi Internet Fiber" }
        content: { type: string, example: "Internet fiber optik adalah teknologi koneksi..." }
        image: { type: string, example: "https://cdn.example.com/article-fiber.jpg" }
        author: { type: string, example: "Tim Nusanet" }
        readingTime: { type: string, example: "3 menit baca" }
        isView: { type: boolean, example: false }
        categoryId: { type: integer, example: 1 }
        category:
          nullable: true
          type: object
          properties:
            id: { type: integer, example: 1 }
            name: { type: string, example: "Tips & Trik" }
        createdAt: { type: string, format: date-time, example: "2024-02-10T08:00:00.000Z" }

    EducationVideo:
      type: object
      properties:
        id: { type: integer, example: 1 }
        title: { type: string, example: "Cara Menggunakan Dashboard Kawan Nusa" }
        url: { type: string, example: "https://www.youtube.com/watch?v=example" }
        thumbnail: { type: string, example: "https://cdn.example.com/video-thumb.jpg" }
        description: { type: string, example: "Tutorial lengkap menggunakan fitur-fitur dashboard Kawan Nusa" }
        author: { type: string, example: "Tim Nusanet" }
        isView: { type: boolean, example: true }
        categoryId: { type: integer, example: 2 }
        category:
          nullable: true
          type: object
          properties:
            id: { type: integer, example: 2 }
            name: { type: string, example: "Tutorial" }
        createdAt: { type: string, format: date-time, example: "2024-02-15T08:00:00.000Z" }

    # --- Template Schemas ---
    Template:
      type: object
      properties:
        id: { type: integer, example: 1 }
        name: { type: string, example: "Banner Promo Lebaran 2024" }
        description: { type: string, nullable: true, example: "Template banner untuk promosi Hari Raya Lebaran" }
        thumbnail: { type: string, nullable: true, example: "https://cdn.example.com/template-thumb.jpg" }
        png: { type: string, nullable: true, example: "https://cdn.example.com/template.png" }
        jpg: { type: string, nullable: true, example: "https://cdn.example.com/template.jpg" }
        psd: { type: string, nullable: true, example: "https://cdn.example.com/template.psd" }
        mp4: { type: string, nullable: true, example: "https://cdn.example.com/template.mp4" }
        isActive: { type: boolean, example: true }
        createdAt: { type: string, format: date-time, example: "2024-01-20T08:00:00.000Z" }

    # --- Service Promotion Schemas ---
    ServicePromotion:
      type: object
      properties:
        id: { type: integer, example: 1 }
        title: { type: string, example: "Promo Double Speed Februari 2024" }
        description: { type: string, example: "Upgrade kecepatan internet Anda 2x lipat tanpa biaya tambahan" }
        image: { type: string, example: "https://cdn.example.com/promo-feb.jpg" }
        url: { type: string, nullable: true, example: "https://nusanet.id/promo/double-speed" }
        startPeriod: { type: string, format: date, example: "2024-02-01" }
        endPeriod: { type: string, format: date, example: "2024-02-29" }
        createdAt: { type: string, format: date-time, example: "2024-01-25T08:00:00.000Z" }

    # --- Statistics Schemas ---
    Achievement:
      type: object
      properties:
        percentage: { type: integer, example: 12 }
        isUp: { type: boolean, example: true }

    StatisticCount:
      type: object
      properties:
        customer:
          type: object
          properties:
            value: { type: integer, example: 148 }
            achievement: { $ref: '#/components/schemas/Achievement' }
        customerService:
          type: object
          properties:
            value: { type: integer, example: 215 }
            achievement: { $ref: '#/components/schemas/Achievement' }
        point:
          type: object
          properties:
            value: { type: integer, example: 25500 }
            achievement: { $ref: '#/components/schemas/Achievement' }

    # --- Additional Schemas ---
    AdditionalItem:
      type: object
      properties:
        code: { type: string, example: "WARNET" }
        name: { type: string, example: "Warnet" }

  parameters:
    PageParam:
      name: page
      in: query
      description: Page number (default 1)
      schema: { type: integer, default: 1, example: 1 }
    LimitParam:
      name: limit
      in: query
      description: Items per page (default 10)
      schema: { type: integer, default: 10, example: 10 }
    SearchParam:
      name: q
      in: query
      description: Search keyword
      schema: { type: string, example: "nusanet" }
    SortParam:
      name: sort
      in: query
      description: Sort field name
      schema: { type: string }
    OrderParam:
      name: order
      in: query
      description: Sort direction
      schema: { type: string, enum: [ASC, DESC], default: DESC }
    StartDateParam:
      name: startDate
      in: query
      description: Filter from date (YYYY-MM-DD)
      schema: { type: string, format: date, example: "2024-01-01" }
    EndDateParam:
      name: endDate
      in: query
      description: Filter to date (YYYY-MM-DD)
      schema: { type: string, format: date, example: "2024-12-31" }

  responses:
    UnauthorizedResponse:
      description: Unauthorized - missing or invalid token
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/BaseResponse'
            example:
              success: false
              statusCode: 401
              message: "Unauthorized"

    NotFoundResponse:
      description: Not Found
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/BaseResponse'
            example:
              success: false
              statusCode: 404
              message: "Resource not found"

    ValidationErrorResponse:
      description: Validation Error
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ValidationError' }

paths:
  # =============================================
  # AUTH ROUTES
  # =============================================
  /auth/register:
    post:
      summary: Register new partner account
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RegisterRequest' }
            example:
              firstName: "Budi"
              lastName: "Santoso"
              email: "budi.santoso@nusanet.id"
              phone: "081234567890"
              password: "secret123"
              company: "PT Nusanet"
              jobPosition: "Sales Manager"
              accountHolderName: "Budi Santoso"
              bankName: "BCA"
              accountNumber: "1234567890"
              isSubscribe: true
              isAutoWithdraw: false
      responses:
        "201":
          description: User registered successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/User' }
              example:
                success: true
                statusCode: 201
                message: "User registered successfully"
                data:
                  id: 1
                  firstName: "Budi"
                  lastName: "Santoso"
                  email: "budi.santoso@nusanet.id"
                  phone: "081234567890"
                  company: "PT Nusanet"
                  jobPosition: "Sales Manager"
                  photo: null
                  bankDetails:
                    holderName: "Budi Santoso"
                    name: "BCA"
                    number: "1234567890"
                  settings:
                    isSubscribe: true
                    isAutoWithdraw: false
                  passwordUpdatedAt: null
                  createdAt: "2024-06-01T08:00:00.000Z"
        "422":
          $ref: '#/components/responses/ValidationErrorResponse'

  /auth/login:
    post:
      summary: Login to partner account
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
            example:
              identifier: "budi.santoso@nusanet.id"
              password: "secret123"
      responses:
        "200":
          description: Logged in successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/AuthResponse' }
