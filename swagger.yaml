  # =============================================
  # STATISTIC ROUTES
  # =============================================
  /statistic/count:
    get:
      summary: Get dashboard summary counts with achievement comparison
      description: "Returns total customers, customer services, and available points with month-over-month percentage achievement."
      tags: [Statistic]
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Statistic count retrieved successfully
          content:
            application/json:
              example:
                success: true
                statusCode: 200
                message: "Statistic count retrieved successfully"
                data:
                  customer:
                    value: 148
                    achievement:
                      percentage: 12
                      isUp: true
                  customerService:
                    value: 215
                    achievement:
                      percentage: 8
                      isUp: true
                  point:
                    value: 25500
                    achievement:
                      percentage: 5
                      isUp: false
        "401":
          $ref: '#/components/responses/UnauthorizedResponse'

  /statistic/point:
    get:
      summary: Get monthly point accumulation chart data for current year
      tags: [Statistic]
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Monthly point statistics retrieved
          content:
            application/json:
              example:
                success: true
                statusCode: 200
                message: "Monthly point statistics retrieved successfully"
                data:
                  - label: "Januari"
                    total: 2500
                  - label: "Februari"
                    total: 3100
                  - label: "Maret"
                    total: 2800
                  - label: "April"
                    total: 0
        "401":
          $ref: '#/components/responses/UnauthorizedResponse'

  /statistic/customer:
    get:
      summary: Get customer growth chart data
      description: "Returns customer growth statistics. Use `type=yearly` for monthly breakdown, or `type=monthly` for daily breakdown of current month."
      tags: [Statistic]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: type
          in: query
          description: "Chart granularity. `yearly` = per month for current year, `monthly` = per day for current month"
          schema:
            type: string
            enum: [yearly, monthly]
            default: yearly
      responses:
        "200":
          description: Customer statistics retrieved
          content:
            application/json:
              examples:
                yearly:
                  summary: Yearly view (per month)
                  value:
                    success: true
                    statusCode: 200
                    message: "Customer yearly statistics retrieved successfully"
                    data:
                      - label: "Januari"
                        count: 12
                      - label: "Februari"
                        count: 18
                      - label: "Maret"
                        count: 9
                monthly:
                  summary: Monthly view (per day)
                  value:
                    success: true
                    statusCode: 200
                    message: "Customer monthly statistics retrieved successfully"
                    data:
                      - label: "1 Maret"
                        count: 2
                      - label: "2 Maret"
                        count: 0
                      - label: "3 Maret"
                        count: 1
        "401":
          $ref: '#/components/responses/UnauthorizedResponse'

  /statistic/redemption-reward:
    get:
      summary: Get redemption status breakdown for voucher and product redemptions
